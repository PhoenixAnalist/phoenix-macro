name: Build Windows EXE

# Runs automatically on every push to main,
# on version tags (e.g. v1.1.0) to create a public release,
# or manually via "Run workflow".
on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install PyQt5 pynput pyinstaller

      - name: Build PhoenixMacro.exe
        run: >
          pyinstaller
          --onefile
          --windowed
          --name PhoenixMacro
          phoenix_macro.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhoenixMacro-Windows
          path: dist\PhoenixMacro.exe
          retention-days: 90

      # Only create a GitHub Release when triggered by a version tag (v*.*.*)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Phoenix Macro ${{ github.ref_name }}"
          files: dist\PhoenixMacro.exe
          generate_release_notes: false
